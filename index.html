<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ToleScores</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
    <div class="logo">⚽ ToleScores</div>
    <div class="header-actions">
        <span>🔍</span>
        <span>📅</span>
        <span>👤</span>
    </div>
</header>

<!-- TABS -->
<div class="tabs">
    <button class="tab active">Agenda del Día</button>
    <button class="tab">Chat</button>
    <button class="tab">Partidos en Vivo 🔴</button>
</div>

<!-- CONTENIDO -->
<div class="main">

    <!-- FEATURED -->
    <section class="featured">

        <!-- MATCH -->
        <div class="featured-match">
            <div class="team">
                <div class="badge">A</div>
                <span id="teamA">Equipo A</span>
            </div>

            <div class="score">
                <span id="score">VS</span>
                <div class="live">LIVE</div>
            </div>

            <div class="team">
                <div class="badge red">B</div>
                <span id="teamB">Equipo B</span>
            </div>
        </div>

        <!-- PLAYER -->
        <div class="featured-player">
            <iframe id="player" allowfullscreen></iframe>
        </div>

        <!-- CHAT -->
        <div class="featured-chat">
            <div class="chat-messages" id="messages"></div>

            <div class="chat-input">
                <input id="msg" placeholder="Comentar...">
                <button onclick="sendMsg()">➤</button>
            </div>
        </div>

    </section>

    <!-- AGENDA -->
    <section class="agenda-section" id="agenda-list"></section>

</div>

<!-- FOOTER -->
<footer>
    Datos basados en fuentes públicas y streamhdx · ToleScores
</footer>

<script src="app.js"></script>

</body>
</html>
